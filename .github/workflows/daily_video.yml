name: Daily Video Compilation and Email

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install playwright
        playwright install chromium --with-deps
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        pip install manus-mcp-cli # Install manus-mcp-cli

    - name: Compile video
      run: python make_video.py

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'videos'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    - name: Get video URL
      id: get_url
      run: |
        VIDEO_URL="${{ steps.deployment.outputs.page_url }}/hormuz_timelapse_$(date +%Y-%m-%d).mp4"
        echo "VIDEO_URL=$VIDEO_URL" >> $GITHUB_OUTPUT

    - name: Send email with video URL
      env:
        RECIPIENT_EMAIL: johnx93@gmail.com
        VIDEO_URL: ${{ steps.get_url.outputs.VIDEO_URL }}
      run: |
        python send_email.py $RECIPIENT_EMAIL $VIDEO_URL
